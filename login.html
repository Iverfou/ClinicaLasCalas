<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — Clínica Las Calas</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --azul: #1A6B7C; --azul2: #134F5C;
      --arena: #F7F4EF; --white: #FFFFFF;
      --ink: #1C2B33; --muted: #6B7F8C;
      --border: #DDD8D0; --error: #C0392B;
      --r: 12px; --shadow: 0 4px 24px rgba(26,107,124,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--arena); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 40px 32px; box-shadow: var(--shadow); width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-mark { width: 48px; height: 48px; background: var(--azul2); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .logo-mark svg { width: 24px; height: 24px; fill: #fff; }
    .logo-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--ink); }
    .logo-sub { font-size: .75rem; color: var(--muted); margin-top: 4px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 7px; }
    .field input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: .9rem; color: var(--ink); outline: none; transition: border-color .2s; }
    .field input:focus { border-color: var(--azul); box-shadow: 0 0 0 3px rgba(26,107,124,.1); }
    .btn { width: 100%; padding: 13px; background: var(--azul); color: #fff; border: none; border-radius: 9px; font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 8px; }
    .btn:hover { background: var(--azul2); transform: translateY(-1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .error-box { background: rgba(192,57,43,.08); border: 1px solid rgba(192,57,43,.3); border-radius: 8px; padding: 12px 16px; font-size: .82rem; color: var(--error); margin-bottom: 16px; display: none; }
    .error-box.visible { display: block; }
    .footer { margin-top: 24px; font-size: .72rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="logo-title">Clínica Las Calas</div>
    <div class="logo-sub">Acceso a su expediente personal</div>
  </div>

  <div class="error-box" id="errorBox">Email o número de expediente incorrecto.</div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="inputEmail" placeholder="su@email.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Nº Expediente</label>
    <input type="text" id="inputDossier" placeholder="CLC-XXXXXXXXXXXXXXX" autocomplete="off"/>
  </div>

  <button class="btn" id="btnLogin" onclick="doLogin()">Acceder a mi expediente →</button>

  <div class="footer">🔒 Acceso seguro · Sus datos están protegidos</div>
</div>

<script>
async function doLogin() {
  const email   = document.getElementById('inputEmail').value.trim();
  const dossier = document.getElementById('inputDossier').value.trim();
  const btn     = document.getElementById('btnLogin');
  const errBox  = document.getElementById('errorBox');

  errBox.classList.remove('visible');

  if (!email || !dossier) {
    errBox.textContent = 'Por favor complete los dos campos.';
    errBox.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Verificando…';

  try {
    const res = await fetch('/api/profil', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', email, dossier })
    });

    const data = await res.json();

    if (data.valid && data.dossier) {
      window.location.href = `/profil.html?dossier=${encodeURIComponent(data.dossier)}`;
    } else {
      errBox.textContent = 'Email o número de expediente incorrecto.';
      errBox.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Acceder a mi expediente →';
    }
  } catch(e) {
    errBox.textContent = 'Error de conexión. Inténtelo de nuevo.';
    errBox.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Acceder a mi expediente →';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
